# A/B Testing workload, typically routed via Ingress based on headers or cookies.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-fitness-version-b
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aceest-fitness
      version: b
  template:
    metadata:
      labels:
        app: aceest-fitness
        version: b
    spec:
      containers:
      - name: aceest-fitness
        image: yourdockerhubuser/aceest-fitness:v1.4-beta
        ports:
        - containerPort: 5000
