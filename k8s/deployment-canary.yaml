apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-fitness-canary
spec:
  # The canary deployment runs alongside the stable version but with fewer replicas.
  replicas: 1 
  selector:
    matchLabels:
      app: aceest-fitness
      track: canary
  template:
    metadata:
      labels:
        app: aceest-fitness
        track: canary
    spec:
      containers:
      - name: aceest-fitness
        image: yourdockerhubuser/aceest-fitness:v1.2-canary
        ports:
        - containerPort: 5000
