# This is a sample for a Blue-Green deployment strategy.
# Blue Environment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-fitness-blue
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aceest-fitness
      color: blue
  template:
    metadata:
      labels:
        app: aceest-fitness
        color: blue
    spec:
      containers:
      - name: aceest-fitness
        image: yourdockerhubuser/aceest-fitness:v1.0
        ports:
        - containerPort: 5000

---
# Green Environment (New Version)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-fitness-green
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aceest-fitness
      color: green
  template:
    metadata:
      labels:
        app: aceest-fitness
        color: green
    spec:
      containers:
      - name: aceest-fitness
        image: yourdockerhubuser/aceest-fitness:v1.1
        ports:
        - containerPort: 5000
