# In a real environment, Shadow deployment requires an API Gateway like Istio or Nginx Ingress with mirroring configured.
# This represents the shadow workload receiving mirrored traffic.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-fitness-shadow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aceest-fitness
      track: shadow
  template:
    metadata:
      labels:
        app: aceest-fitness
        track: shadow
    spec:
      containers:
      - name: aceest-fitness
        image: yourdockerhubuser/aceest-fitness:v1.3-shadow
        ports:
        - containerPort: 5000
